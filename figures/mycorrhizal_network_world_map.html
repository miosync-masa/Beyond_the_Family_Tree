
<div id="map" style="width: 100%;"></div>

  {donor:"Arabic",recipient:"Romanian",count:10,d_lat:24,d_lon:45,r_lat:46,r_lon:25,pathway:"faith"},
  {donor:"Arabic",recipient:"Malagasy",count:13,d_lat:24,d_lon:45,r_lat:-18.9,r_lon:47.5,pathway:"faith"},

const isDark = matchMedia('(prefers-color-scheme:dark)').matches;
const pathwayColors = {faith:'#7F77DD',force:'#D85A30',contagion:'#1D9E75'};

const legendEl = document.getElementById('legend');
legendEl.innerHTML = [
  ['Faith mycorrhiza (religion/learning)','#7F77DD'],
  ['Force mycorrhiza (conquest/colonization)','#D85A30'],
  ['Contagion mycorrhiza (trade/contact)','#1D9E75']
].map(([l,c])=>`<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:${c}"></span>${l}</span>`).join('');

const W=900,H=480;
const svg = d3.select('#map').append('svg').attr('viewBox',`0 0 ${W} ${H}`).attr('width','100%');
const proj = d3.geoNaturalEarth1().scale(150).translate([W/2,H/2+20]);
const path = d3.geoPath(proj);

d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(world=>{
  svg.append('g').selectAll('path')
    .data(topojson.feature(world,world.objects.countries).features).join('path')
    .attr('d',path)
    .attr('fill',isDark?'#2C2C2A':'#F1EFE8')
    .attr('stroke',isDark?'rgba(255,255,255,.1)':'rgba(0,0,0,.08)')
    .attr('stroke-width',0.5);

  const lineG = svg.append('g').attr('class','lines');
  const nodeG = svg.append('g').attr('class','nodes');
  drawFlows('all');
});

function drawFlows(filter){
  const lineG = svg.select('.lines');
  const nodeG = svg.select('.nodes');
  lineG.selectAll('*').remove();
  nodeG.selectAll('*').remove();

  let ff = flows;
  if(filter==='arabic') ff = flows.filter(f=>f.donor.includes('Arabic')||f.donor==='Classical Arabic');
  else if(filter!=='all') ff = flows.filter(f=>f.pathway===filter);

  const maxC = d3.max(ff,d=>d.count)||1;

  ff.forEach(f=>{
    const [x1,y1]=proj([f.d_lon,f.d_lat]);
    const [x2,y2]=proj([f.r_lon,f.r_lat]);
    if(!x1||!x2) return;
    const mx=(x1+x2)/2, my=(y1+y2)/2-Math.abs(x2-x1)*0.15;
    const w = 0.5 + (f.count/maxC)*4;
    const op = 0.15 + (f.count/maxC)*0.55;
    const col = pathwayColors[f.pathway];
    lineG.append('path')
      .attr('d',`M${x1},${y1} Q${mx},${my} ${x2},${y2}`)
      .attr('fill','none')
      .attr('stroke',col)
      .attr('stroke-width',w)
      .attr('opacity',op)
      .on('mouseover',function(){
        d3.select(this).attr('stroke-width',w+2).attr('opacity',1);
        document.getElementById('info').textContent=`${f.donor} → ${f.recipient}: ${f.count} DNA fragments (${f.pathway})`;
      })
      .on('mouseout',function(){
        d3.select(this).attr('stroke-width',w).attr('opacity',op);
        document.getElementById('info').textContent='';
      });
  });

  const nodeMap = new Map();
  ff.forEach(f=>{
    if(!nodeMap.has(f.donor)) nodeMap.set(f.donor,{lat:f.d_lat,lon:f.d_lon,isDonor:true,total:0});
    if(!nodeMap.has(f.recipient)) nodeMap.set(f.recipient,{lat:f.r_lat,lon:f.r_lon,isDonor:false,total:0});
    nodeMap.get(f.donor).total+=f.count;
    nodeMap.get(f.recipient).total+=f.count;
  });

  nodeMap.forEach((v,k)=>{
    const [cx,cy]=proj([v.lon,v.lat]);
    if(!cx) return;
    const r = 2+Math.sqrt(v.total/50);
    nodeG.append('circle')
      .attr('cx',cx).attr('cy',cy).attr('r',Math.min(r,8))
      .attr('fill',v.isDonor?(isDark?'#AFA9EC':'#534AB7'):(isDark?'#D3D1C7':'#5F5E5A'))
      .attr('stroke',isDark?'rgba(255,255,255,.3)':'rgba(0,0,0,.2)')
      .attr('stroke-width',0.5);
    if(r>3.5){
      nodeG.append('text')
        .attr('x',cx).attr('y',cy-Math.min(r,8)-3)
        .attr('text-anchor','middle')
        .attr('font-size','9px')
        .attr('fill',isDark?'#D3D1C7':'#5F5E5A')
        .text(k);
    }
  });
}

function filterPathway(p){
  drawFlows(p);
}
</script>
